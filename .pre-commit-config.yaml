repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: true

      - id: pytest
        name: pytest
        entry: uv run pytest tests/ -x -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
