repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy --exclude ^auto-reviewer/tests/fixtures/ src/ tests/ auto-core/src/ auto-reviewer/src/ auto-reviewer/tests/
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: pytest-scientist
        name: pytest-scientist
        entry: uv run pytest tests/ -x -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: pytest-reviewer
        name: pytest-reviewer
        entry: uv run pytest auto-reviewer/tests/ -x -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
